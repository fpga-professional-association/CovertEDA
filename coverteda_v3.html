function Btn({children,onClick,primary,small,disabled,style:sx,icon}){
  const[h,setH]=useState(false);
  return <button onClick={disabled?undefined:onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{display:"inline-flex",alignItems:"center",gap:4,padding:small?"2px 8px":"6px 12px",borderRadius:4,
      border:primary?"none":`1px solid ${C.b1}`,fontFamily:M,fontSize:small?9:10,fontWeight:600,
      background:primary?(h?"#4da6ff":C.accent):(h?C.s3:"transparent"),
      color:primary?"#fff":C.t2,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.4:1,transition:"all .1s",...sx}}>
    {icon&&<span style={{display:"flex"}}>{icon}</span>}{children}
  </button>;
}

function HoverRow({children,style:sx,onClick}){const[h,setH]=useState(false);return <div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:h?C.s3:"transparent",cursor:onClick?"pointer":"default",transition:"background .06s",...sx}}>{children}</div>;}

function NavBtn({icon,label,active,onClick,accent,badge}){
  const[h,setH]=useState(false);
  return <div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} title={label}
    style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 4px",cursor:"pointer",borderRadius:5,position:"relative",
      background:active?C.accentDim:(h?C.s3:"transparent"),color:active?(accent||C.accent):(h?C.t2:C.t3),
      borderLeft:active?`2px solid ${accent||C.accent}`:"2px solid transparent",transition:"all .1s",minWidth:52}}>
    <span style={{display:"flex"}}>{icon}</span>
    <span style={{fontSize:7,fontFamily:M,fontWeight:600,letterSpacing:.3}}>{label}</span>
    {badge&&<span style={{position:"absolute",top:4,right:6,width:6,height:6,borderRadius:3,background:accent||C.accent}}/>}
  </div>;
}

const GTC={M:C.warn,A:C.ok,U:C.orange,D:C.err,clean:null};

function FileTreeRow({f,active,onPick}){
  const[h,setH]=useState(false);
  if(f.ty==="folder") return <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 8px",paddingLeft:8+f.d*12,fontSize:10,fontFamily:M,fontWeight:700,color:C.t2,letterSpacing:.3,borderBottom:`1px solid ${C.b1}08`,marginTop:f.d===0?4:0}}>
    <span style={{color:C.warn,fontSize:8}}>{f.open?"▼":"▶"}</span>{f.n.toUpperCase()}
    <span style={{fontSize:8,color:C.t3,fontWeight:400}}>{"/"}</span>
  </div>;
  return <div onClick={onPick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{display:"grid",gridTemplateColumns:"1fr 14px 14px 14px",gap:2,alignItems:"center",
      padding:"3px 6px 3px "+(8+f.d*12)+"px",fontSize:10,fontFamily:M,
      background:active?C.accentDim:(h?`${C.s3}88`:"transparent"),
      borderLeft:active?`2px solid ${C.accent}`:"2px solid transparent",
      cursor:"pointer",transition:"all .08s"}}>
    <div style={{display:"flex",alignItems:"center",gap:4,minWidth:0,overflow:"hidden"}}>
      {/* Git status letter */}
      {f.git&&f.git!=="clean"?<span style={{color:GTC[f.git],fontSize:9,fontWeight:700,width:10,textAlign:"center",flexShrink:0}}>{f.git}</span>
        :<span style={{width:10,flexShrink:0}}/>}
      {/* File name */}
      <span style={{color:active?C.t1:C.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.n}</span>
      {/* Unsaved dot */}
      {!f.saved&&<span style={{width:5,height:5,borderRadius:"50%",background:C.err,flexShrink:0}} title="Unsaved"/>}
    </div>
    {/* Synth indicator */}
    <span title={f.synth?"In synthesis":"Not in synthesis"} style={{fontSize:8,textAlign:"center",color:f.synth?C.ok:C.t3,opacity:f.synth?1:.25}}>S</span>
    {/* Sim indicator */}
    <span title={f.sim?"In simulation":"Not in simulation"} style={{fontSize:8,textAlign:"center",color:f.sim?C.purple:C.t3,opacity:f.sim?1:.25}}>T</span>
    {/* Type badge */}
    <span style={{fontSize:7,textAlign:"center",color:FTC[f.ty],opacity:.7}}>{f.ty==="rtl"?"⬡":f.ty==="tb"?"◈":f.ty==="constr"?"◉":f.ty==="ip"?"◎":"·"}</span>
  </div>;
}

// SVG icons

  Play:()=><svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M2.5 1l8 5-8 5z"/></svg>,
  Check:()=><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 6l3 3L10 3"/></svg>,
  Search:()=><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="6" cy="6" r="4"/><path d="M9 9l3 3"/></svg>,
  Chip:()=><svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.2"><rect x="4" y="4" width="10" height="10" rx="1"/><path d="M7 4V2M11 4V2M7 14v2M11 14v2M4 7H2M4 11H2M14 7h2M14 11h2"/></svg>,
  Git:()=><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="8" cy="3.5" r="1.5"/><circle cx="8" cy="12.5" r="1.5"/><circle cx="12" cy="8" r="1.5"/><path d="M8 5v6M9.3 7.2l1.5.3"/></svg>,
  Branch:()=><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="5" cy="4" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="7" r="2"/><path d="M5 6v4M7 5.5l3 1"/></svg>,
  Arrow:()=><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M4 8h8M9 5l3 3-3 3"/></svg>,
  Zap:()=><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M7.5 1L3 8h4l-1 5 5-7H7l.5-5z"/></svg>,
  Gauge:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M2 11a6 6 0 1112 0"/><path d="M8 11V5.5"/><circle cx="8" cy="11" r="1" fill="currentColor"/></svg>,
  Pin:()=><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3"><rect x="3" y="1" width="8" height="6" rx="1"/><path d="M5 7v3M9 7v3M7 10v3"/></svg>,
  Term:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="1" y="2" width="14" height="12" rx="2"/><path d="M4 6l3 2.5L4 11M9 11h3"/></svg>,
  Doc:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M4 2h5l3 3v9H4z"/><path d="M9 2v3h3"/><path d="M6 8h4M6 10.5h3"/></svg>,
  Clock:()=><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="7" cy="7" r="5.5"/><path d="M7 4v3.5l2.5 1.5"/></svg>,
  Warn:()=><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M7 1L1 13h12z"/><path d="M7 5.5v3M7 10.5v.5"/></svg>,
  Bolt:()=><svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M4 1v5H2L7 13V8h2z"/></svg>,
  Key:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="5.5" cy="10.5" r="3"/><path d="M8 8l5-5M11 3l2 2"/></svg>,
  Settings:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><circle cx="8" cy="8" r="2.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.8 3.8l1.4 1.4M10.8 10.8l1.4 1.4M3.8 12.2l1.4-1.4M10.8 5.2l1.4-1.4"/></svg>,
  Box:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M8 1L2 4v8l6 3 6-3V4z"/><path d="M2 4l6 3 6-3M8 7v8"/></svg>,
  Brain:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M8 14V8"/><path d="M5 3a3 3 0 013-1 3 3 0 013 1"/><circle cx="5" cy="6" r="2.5"/><circle cx="11" cy="6" r="2.5"/><path d="M5 8.5C5 10 6 11 8 11s3-1 3-2.5"/></svg>,
  Link:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M4 8h8"/><rect x="1" y="5" width="5" height="6" rx="1"/><rect x="10" y="5" width="5" height="6" rx="1"/></svg>,
  Map:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M5 3v10M11 3v10M1 8h14"/></svg>,
};

// ═══════════════════ MAIN APP ═══════════════════
function App(){
  const[bid,setBid]=useState("diamond");
  const[sec,setSec]=useState("build");
  const[building,setBuilding]=useState(false);
  const[bStep,setBStep]=useState(-1);
  const[logs,setLogs]=useState([]);
  const[cmdOpen,setCmdOpen]=useState(false);
  const[cmdQ,setCmdQ]=useState("");
  const[devOpen,setDevOpen]=useState(false);
  const[aFile,setAFile]=useState("pqc_engine.sv");
  const[showFiles,setShowFiles]=useState(true);
  const[rptTab,setRptTab]=useState("timing");
  const[gitExpanded,setGitExpanded]=useState(false);
  const logRef=useRef(null);
  const B=BACKENDS[bid];

  const switchBackend=(id)=>{setBid(id);setBStep(-1);setLogs([]);setBuilding(false);};
  const runBuild=()=>{
    setBuilding(true);setBStep(0);setLogs([]);setSec("build");
    let step=0,li=0;
    const si=setInterval(()=>{step++;setBStep(step);if(step>=B.pipeline.length){clearInterval(si);setBuilding(false);}},950);
    const ti=setInterval(()=>{if(li<B.log.length){setLogs(p=>[...p,B.log[li]]);li++;}else clearInterval(ti);},200);
  };
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[logs]);
  useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(p=>!p);}if(e.key==="Escape"){setCmdOpen(false);setDevOpen(false);}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const panel={background:C.s1,borderRadius:7,border:`1px solid ${C.b1}`,overflow:"hidden"};
  const panelP={...panel,padding:14};
  const hdr=(t,icon)=><div style={{fontSize:11,fontWeight:700,color:C.t1,marginBottom:10,display:"flex",alignItems:"center",gap:5}}>{icon}{t}</div>;

  const RBar=({l,u,t})=>{const p=Math.round(u/t*100);const col=p>85?C.err:p>65?C.warn:C.accent;return <div style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",fontSize:9,fontFamily:M,marginBottom:2}}><span style={{color:C.t2}}>{l}</span><span style={{color:col}}>{u.toLocaleString()}/{t.toLocaleString()} ({p}%)</span></div><div style={{height:4,borderRadius:2,background:C.b1,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,width:`${p}%`,background:`linear-gradient(90deg,${col}88,${col})`}}/></div></div>;};

  const PStep=({s,i,total})=>{let st="pending";if(building){if(i<bStep)st="done";else if(i===bStep)st="run";}else if(bStep>=total&&bStep>=0)st="done";const col={done:C.ok,run:C.accent,pending:C.t3}[st];return <div style={{display:"flex",gap:8,alignItems:"flex-start"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:18}}><div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${col}`,background:st!=="pending"?`${col}15`:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{st==="done"&&<I.Check/>}{st==="run"&&<div style={{width:5,height:5,borderRadius:3,background:col,animation:"pulse 1s infinite"}}/>}</div>{i<total-1&&<div style={{width:1.5,height:22,background:st==="done"?col:C.b1}}/>}</div><div style={{paddingBottom:i<total-1?2:0}}><div style={{fontSize:10,fontFamily:M,fontWeight:600,color:st==="pending"?C.t3:C.t1}}>{s.label}</div>{st!=="pending"&&<div style={{fontSize:8,fontFamily:M,color:C.t3,marginTop:1}}>{s.cmd}</div>}</div></div>;};

  const CLine=({l})=>{const col={info:C.t3,cmd:C.cyan,ok:C.ok,warn:C.warn,err:C.err,out:C.t2}[l.t];const pre={cmd:"$ ",err:"✗ ",warn:"⚠ ",ok:"✓ ",info:"› ",out:"  "}[l.t]||"";return <div style={{fontSize:10,fontFamily:M,lineHeight:1.6,color:col}}><span style={{opacity:.5}}>{pre}</span>{l.m}</div>;};

  // Synthesis file counts
  const synthFiles=FILES.filter(f=>f.synth);
  const unsavedFiles=FILES.filter(f=>!f.saved&&f.ty!=="folder");
  const dirtyGitFiles=FILES.filter(f=>f.git&&f.git!=="clean"&&f.ty!=="folder");

  return <div style={{width:"100vw",height:"100vh",background:C.bg,color:C.t2,fontFamily:S,display:"flex",flexDirection:"column",overflow:"hidden"}}>

    {/* ══════════════ GIT STATUS BAR ══════════════ */}
    <div style={{display:"flex",alignItems:"center",height:28,padding:"0 12px",background:"#080a10",borderBottom:`1px solid ${C.b1}`,gap:8,fontSize:9,fontFamily:M,flexShrink:0}}>
      <span style={{display:"flex",color:C.t3}}><I.Branch/></span>
      <span style={{color:C.accent,fontWeight:700,cursor:"pointer"}} onClick={()=>setGitExpanded(p=>!p)}>{GIT.branch}</span>
      {GIT.tags.length>0&&<Badge color={C.cyan} style={{fontSize:8}}>{GIT.tags[0]}</Badge>}
      <span style={{color:C.t3,opacity:.4}}>│</span>
      <span style={{color:C.t3}}>{GIT.commit}</span>
      <span style={{color:C.t2,maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{GIT.commitMsg}"</span>
      <span style={{color:C.t3}}>— {GIT.time}</span>
      <span style={{color:C.t3,opacity:.4}}>│</span>
      {GIT.ahead>0&&<span style={{color:C.ok}}>↑{GIT.ahead}</span>}
      {GIT.behind>0&&<span style={{color:C.warn}}>↓{GIT.behind}</span>}
      {GIT.ahead===0&&GIT.behind===0&&<span style={{color:C.t3}}>in sync</span>}
      <span style={{color:C.t3,opacity:.4}}>│</span>
      {GIT.dirty?<>
        {GIT.staged>0&&<span style={{color:C.ok}}>+{GIT.staged} staged</span>}
        {GIT.unstaged>0&&<span style={{color:C.warn}}>~{GIT.unstaged} modified</span>}
        {GIT.untracked>0&&<span style={{color:C.orange}}>?{GIT.untracked} untracked</span>}
      </>:<span style={{color:C.ok}}>✓ clean</span>}
      {GIT.stashes>0&&<><span style={{color:C.t3,opacity:.4}}>│</span><span style={{color:C.purple}}>{GIT.stashes} stash</span></>}
      <div style={{flex:1}}/>
      <Btn small style={{padding:"1px 6px",fontSize:8}}>Pull</Btn>
      <Btn small style={{padding:"1px 6px",fontSize:8}}>Push ↑{GIT.ahead}</Btn>
      <Btn small style={{padding:"1px 6px",fontSize:8}}>Stash</Btn>
    </div>

    {/* Git commit log dropdown */}
    {gitExpanded&&<div onClick={()=>setGitExpanded(false)} style={{position:"fixed",inset:0,zIndex:700}}>
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:28,left:80,width:520,background:C.s1,border:`1px solid ${C.b2}`,borderRadius:8,overflow:"hidden",boxShadow:"0 12px 40px rgba(0,0,0,.5)",animation:"slideDown .12s ease",zIndex:701}}>
        <div style={{padding:"10px 14px",fontSize:10,fontFamily:M,fontWeight:700,color:C.t3,borderBottom:`1px solid ${C.b1}`,display:"flex",gap:8,alignItems:"center"}}>
          <I.Git/>RECENT COMMITS — {GIT.branch}
          <div style={{flex:1}}/>
          <Badge color={C.ok}>↑{GIT.ahead} ahead</Badge>
        </div>
        {GIT.recentCommits.map((c,i)=><HoverRow key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderBottom:`1px solid ${C.b1}`,fontSize:10,fontFamily:M}}>
          <span style={{color:i<GIT.ahead?C.ok:C.accent,fontWeight:700,width:56}}>{c.hash}</span>
          <span style={{color:C.t1,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.msg}</span>
          <span style={{color:C.t3,flexShrink:0}}>{c.author}</span>
          <span style={{color:C.t3,flexShrink:0,width:28,textAlign:"right"}}>{c.time}</span>
          {i<GIT.ahead&&<Badge color={C.ok} style={{fontSize:7}}>LOCAL</Badge>}
        </HoverRow>)}
      </div>
    </div>}

    {/* CMD PALETTE */}
    {cmdOpen&&<div onClick={()=>{setCmdOpen(false);setCmdQ("");}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80}}>
      <div onClick={e=>e.stopPropagation()} style={{width:480,background:C.s1,border:`1px solid ${C.b2}`,borderRadius:10,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,.5)",animation:"slideDown .12s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"10px 12px",borderBottom:`1px solid ${C.b1}`}}>
          <I.Search/><input autoFocus value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Commands: build, switch, reports, git..."
            style={{flex:1,background:"transparent",border:"none",color:C.t1,fontSize:12,fontFamily:S,outline:"none"}}/>
          <span style={{fontSize:8,fontFamily:M,color:C.t3,padding:"1px 4px",border:`1px solid ${C.b1}`,borderRadius:2}}>ESC</span>
        </div>
        <div style={{maxHeight:280,overflowY:"auto"}}>
          {[{l:"Build All",c:"Build",d:`${B.short} flow`,a:runBuild},{l:"Reports",c:"View",d:"Timing, Utilization, Power, DRC, I/O",a:()=>setSec("reports")},
            {l:"Switch: Diamond",c:"Backend",a:()=>switchBackend("diamond")},{l:"Switch: Quartus",c:"Backend",a:()=>switchBackend("quartus")},
            {l:"Switch: Vivado",c:"Backend",a:()=>switchBackend("vivado")},{l:"Switch: OSS",c:"Backend",a:()=>switchBackend("opensource")},
            {l:"Git: Commit",c:"Git",d:"Stage & commit changes"},{l:"Git: Push",c:"Git",d:`Push ${GIT.ahead} commits to remote`},
            {l:"Git: Pull",c:"Git"},{l:"Git: Stash",c:"Git"},{l:"Git: Log",c:"Git",a:()=>setGitExpanded(true)},
          ].filter(c=>!cmdQ||(c.l+c.c).toLowerCase().includes(cmdQ.toLowerCase()))
           .map((cmd,i)=><HoverRow key={i} onClick={()=>{setCmdOpen(false);setCmdQ("");cmd.a&&cmd.a();}}
            style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px"}}>
            <span style={{fontSize:8,fontFamily:M,color:C.t3,width:48,letterSpacing:.5}}>{cmd.c}</span>
            <div style={{flex:1}}><div style={{fontSize:11,color:C.t1}}>{cmd.l}</div>{cmd.d&&<div style={{fontSize:9,fontFamily:M,color:C.t3}}>{cmd.d}</div>}</div>
          </HoverRow>)}
        </div>
      </div>
    </div>}

    {/* Backend switcher */}
    {devOpen&&<div onClick={()=>setDevOpen(false)} style={{position:"fixed",inset:0,zIndex:800}}>
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:70,left:56,width:320,background:C.s1,border:`1px solid ${C.b2}`,borderRadius:8,overflow:"hidden",boxShadow:"0 12px 40px rgba(0,0,0,.5)",animation:"slideDown .1s ease"}}>
        <div style={{padding:"8px 12px",fontSize:8,fontFamily:M,fontWeight:700,letterSpacing:1.5,color:C.t3,borderBottom:`1px solid ${C.b1}`}}>SELECT BACKEND</div>
        {Object.values(BACKENDS).map(b=><BackendOption key={b.id} b={b} active={b.id===bid} onPick={()=>{switchBackend(b.id);setDevOpen(false);}}/>)}
      </div>
    </div>}

    <div style={{flex:1,display:"flex",overflow:"hidden"}}>

      {/* ══════ LEFT NAV ══════ */}
      <div style={{width:56,flexShrink:0,background:C.s1,borderRight:`1px solid ${C.b1}`,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:6,gap:1}}>
        <div onClick={()=>setDevOpen(p=>!p)} style={{padding:"6px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,borderBottom:`1px solid ${C.b1}`,marginBottom:4,width:"100%"}}>
          <span style={{color:C.accent}}><I.Chip/></span>
          <span style={{fontSize:6,fontFamily:M,fontWeight:700,color:B.color,letterSpacing:.3}}>{B.short.toUpperCase()}</span>
        </div>
        <NavBtn icon={<I.Zap/>} label="Build" active={sec==="build"} onClick={()=>setSec("build")} badge={building}/>
        <NavBtn icon={<I.Doc/>} label="Reports" active={sec==="reports"} onClick={()=>setSec("reports")} accent={C.cyan}/>
        <NavBtn icon={<I.Box/>} label="IP" active={sec==="ip"} onClick={()=>setSec("ip")} accent={C.purple}/>
        <NavBtn icon={<I.Link/>} label="Interc" active={sec==="interconnect"} onClick={()=>setSec("interconnect")} accent={C.cyan}/>
        <NavBtn icon={<I.Brain/>} label="AI" active={sec==="ai"} onClick={()=>setSec("ai")} accent={C.pink}/>
        <NavBtn icon={<I.Map/>} label="Regs" active={sec==="regmap"} onClick={()=>setSec("regmap")} accent={C.orange}/>
        <NavBtn icon={<I.Pin/>} label="Constr" active={sec==="constraints"} onClick={()=>setSec("constraints")}/>
        <NavBtn icon={<I.Gauge/>} label="Rsrc" active={sec==="resources"} onClick={()=>setSec("resources")}/>
        <NavBtn icon={<I.Term/>} label="Log" active={sec==="console"} onClick={()=>setSec("console")}/>
        <div style={{flex:1}}/>
        <NavBtn icon={<I.Key/>} label="Lic" accent={C.warn}/>
        <NavBtn icon={<I.Settings/>} label="Cfg"/>
        <div style={{height:6}}/>
      </div>

      {/* ══════ FILE TREE PANEL ══════ */}
      {showFiles&&<div style={{width:230,flexShrink:0,background:C.s1,borderRight:`1px solid ${C.b1}`,display:"flex",flexDirection:"column",fontSize:10}}>
        {/* File panel header */}
        <div style={{padding:"7px 10px",borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",gap:5}}>
          <span style={{fontSize:9,fontFamily:M,fontWeight:700,color:C.t3,letterSpacing:1}}>PROJECT FILES</span>
          <div style={{flex:1}}/>
          {unsavedFiles.length>0&&<Badge color={C.err}>{unsavedFiles.length} unsaved</Badge>}
        </div>
        {/* Legend row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 14px 14px 14px",gap:2,padding:"4px 6px 4px 20px",fontSize:7,fontFamily:M,color:C.t3,borderBottom:`1px solid ${C.b1}`,letterSpacing:.3}}>
          <span>NAME</span><span title="In Synthesis" style={{textAlign:"center",color:C.ok}}>S</span><span title="In Simulation" style={{textAlign:"center",color:C.purple}}>T</span><span style={{textAlign:"center"}}>⌂</span>
        </div>
        {/* File list */}
        <div style={{flex:1,overflowY:"auto"}}>
          {FILES.map((f,i)=><FileTreeRow key={i} f={f} active={f.n===aFile} onPick={()=>f.ty!=="folder"&&setAFile(f.n)}/>)}
        </div>
        {/* File panel footer stats */}

                    </div>
                    {bk.pins.map((p,pi)=>{const[pin,net,dir]=p.split(" ");return <div key={pi} style={{fontSize:9,fontFamily:M,padding:"2px 0",display:"flex",gap:4}}>
                      <span style={{color:C.cyan,width:28,flexShrink:0}}>{pin}</span>
                      <span style={{color:C.t1,flex:1}}>{net}</span>
                      <span style={{color:{IN:C.accent,OUT:C.ok,BIDIR:C.purple}[dir]||C.t3,fontSize:8}}>{dir}</span>
                    </div>;})}
                  </div>;})}
                </div>
              </div>
            </div>}
          </div>}

          {/* ════════════════ RESOURCES (quick view) ════════════════ */}
          {sec==="resources"&&<div style={panelP}>
            {hdr(<>Utilization — <span style={{color:B.color}}>{B.defaultDev}</span></>,<I.Gauge/>)}
            {B.resources.map((r,i)=><RBar key={i} {...r}/>)}
            <div style={{marginTop:10}}><Btn small onClick={()=>{setSec("reports");setRptTab("util");}}>Open Full Utilization Report →</Btn></div>
          </div>}

          {/* ════════════════ CONSOLE ════════════════ */}
          {sec==="console"&&<div style={{...panel,height:"calc(100vh - 120px)",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderBottom:`1px solid ${C.b1}`,fontSize:9,fontFamily:M,color:C.t3}}>
              <span style={{color:B.color}}>{B.icon}</span>{B.short} Output<span style={{flex:1}}/>{logs.length} lines
              <Btn small onClick={()=>setLogs([])}>Clear</Btn>
            </div>
            <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"6px 12px",background:"#030508"}}>
              {logs.length===0&&<div style={{color:C.t3,fontSize:10,fontFamily:M,padding:12,textAlign:"center"}}>Hit Build or ⌘K</div>}
              {logs.map((l,i)=><CLine key={i} l={l}/>)}
              {building&&<div style={{fontSize:10,color:C.accent,fontFamily:M}}><span style={{animation:"pulse 1s infinite"}}>●</span> Building...</div>}
            </div>
          </div>}

          {/* ════════════════ CONSTRAINTS (quick) ════════════════ */}
          {sec==="constraints"&&<div style={panelP}>
            {hdr("Pin Constraints",<I.Pin/>)}
            <Btn small onClick={()=>{setSec("reports");setRptTab("io");}}>Open Full I/O Report →</Btn>
          </div>}

          {/* placeholder for other sections */}
          {["ip","interconnect","ai","regmap"].includes(sec)&&<div style={panelP}>
            {hdr(`${sec.charAt(0).toUpperCase()+sec.slice(1)} — carried from v2`,null)}
            <div style={{color:C.t3,fontSize:10,fontFamily:M}}>This section is identical to v2. Use the nav to explore Reports, Build, or Console — the new features in v3.</div>
          </div>}

        </div>
      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
