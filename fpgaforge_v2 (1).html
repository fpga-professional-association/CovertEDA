function App(){
  const[bid,setBid]=useState("diamond");
  const[section,setSection]=useState("build");
  const[building,setBuilding]=useState(false);
  const[bStep,setBStep]=useState(-1);
  const[logs,setLogs]=useState([]);
  const[cSearch,setCSearch]=useState("");
  const[cmdOpen,setCmdOpen]=useState(false);
  const[cmdQ,setCmdQ]=useState("");
  const[devOpen,setDevOpen]=useState(false);
  const[licOpen,setLicOpen]=useState(false);
  const[selIP,setSelIP]=useState(null);
  const[aiInput,setAiInput]=useState("");
  const[aiChat,setAiChat]=useState(AI_SAMPLE_CHAT);
  const[aiLoading,setAiLoading]=useState(false);
  const[selReg,setSelReg]=useState(0);
  const[ixHover,setIxHover]=useState(null);
  const logRef=useRef(null);
  const aiRef=useRef(null);

  const B=BACKENDS[bid];
  const switchBackend=(id)=>{setBid(id);setBStep(-1);setLogs([]);setBuilding(false);setSelIP(null);};

  const runBuild=()=>{
    setBuilding(true);setBStep(0);setLogs([]);setSection("build");
    let step=0,logIdx=0;
    const si=setInterval(()=>{step++;setBStep(step);if(step>=B.pipeline.length){clearInterval(si);setBuilding(false);}},1000);
    const li=setInterval(()=>{if(logIdx<B.log.length){setLogs(p=>[...p,B.log[logIdx]]);logIdx++;}else clearInterval(li);},220);
  };

  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[logs]);
  useEffect(()=>{if(aiRef.current)aiRef.current.scrollTop=aiRef.current.scrollHeight;},[aiChat]);

  useEffect(()=>{
    const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(p=>!p);}if(e.key==="Escape"){setCmdOpen(false);setDevOpen(false);setLicOpen(false);}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  const sendAI=()=>{
    if(!aiInput.trim())return;
    setAiChat(p=>[...p,{role:"user",text:aiInput}]);
    setAiInput("");setAiLoading(true);
    setTimeout(()=>{
      setAiChat(p=>[...p,{role:"ai",text:`Analyzing your ${B.short} project reports for "${aiInput.trim().substring(0,40)}...":\n\nBased on the current build (${B.defaultDev}, Fmax ${B.timing.fmax} MHz), I can see your design is using ${B.resources[0].used}/${B.resources[0].total} ${B.resources[0].label} (${Math.round(B.resources[0].used/B.resources[0].total*100)}%).\n\nThe critical path through the PQC engine has ${B.timing.setup} ns setup slack — this gives you headroom for optimization. Would you like me to suggest specific TCL directives for ${B.short} to improve this?`}]);
      setAiLoading(false);
    },2000);
  };

  // Pipeline step renderer
  const PStep=({step,idx,total})=>{
    let st="pending";
    if(building){if(idx<bStep)st="done";else if(idx===bStep)st="run";}
    else if(bStep>=total&&bStep>=0)st="done";
    const col={done:C.ok,run:C.accent,pending:C.t3}[st];
    const bg2={done:C.okDim,run:C.accentDim}[st];
    return <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:20}}>
        <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${col}`,background:bg2||"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {st==="done"&&<I.Check/>}{st==="run"&&<div style={{width:6,height:6,borderRadius:"50%",background:col,animation:"pulse 1s infinite"}}/>}
        </div>
        {idx<total-1&&<div style={{width:2,height:28,background:st==="done"?col:C.b1,transition:"all .3s"}}/>}
      </div>
      <div style={{paddingBottom:idx<total-1?4:0}}>
        <div style={{fontSize:11,fontFamily:M,fontWeight:600,color:st==="pending"?C.t3:C.t1}}>{step.label}</div>
        {st!=="pending"&&<div style={{fontSize:9,fontFamily:M,color:C.t3,marginTop:1}}>{step.cmd}</div>}
      </div>
    </div>;
  };

  const RBar=({label,used,total,unit=""})=>{
    const pct=Math.round(used/total*100);
    const col=pct>85?C.err:pct>65?C.warn:C.accent;
    return <div style={{marginBottom:11}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:M,marginBottom:3}}>
        <span style={{color:C.t2}}>{label}</span>
        <span style={{color:col}}>{used.toLocaleString()}{unit}/{total.toLocaleString()}{unit} ({pct}%)</span>
      </div>
      <div style={{height:5,borderRadius:3,background:C.b1,overflow:"hidden"}}>
        <div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:`linear-gradient(90deg,${col}88,${col})`,transition:"width .5s"}}/>
      </div>
    </div>;
  };

  const CLine=({l})=>{
    const col={info:C.t3,cmd:C.cyan,ok:C.ok,warn:C.warn,err:C.err,out:C.t2}[l.t]||C.t2;

    return <div style={{fontSize:11,fontFamily:M,lineHeight:1.7,color:col}}><span style={{opacity:.5}}>{pre}</span>{l.m}</div>;
  };

  const panel={background:C.s1,borderRadius:8,border:`1px solid ${C.b1}`,overflow:"hidden"};
  const panelP={...panel,padding:16};
  const hdr=(text,icon)=><div style={{fontSize:12,fontWeight:700,fontFamily:S,color:C.t1,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>{icon}{text}</div>;

  return <div style={{width:"100vw",height:"100vh",background:C.bg,color:C.t2,fontFamily:S,display:"flex",overflow:"hidden"}}>

    {/* ── CMD PALETTE ── */}
    {cmdOpen&&<div onClick={()=>{setCmdOpen(false);setCmdQ("");}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(4px)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:90}}>
      <div onClick={e=>e.stopPropagation()} style={{width:500,background:C.s1,border:`1px solid ${C.b2}`,borderRadius:10,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,.5)",animation:"slideDown .15s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px",borderBottom:`1px solid ${C.b1}`}}>
          <I.Search/><input autoFocus value={cmdQ} onChange={e=>setCmdQ(e.target.value)} placeholder="Commands: build, switch, license, ip..."
            style={{flex:1,background:"transparent",border:"none",color:C.t1,fontSize:13,fontFamily:S,outline:"none"}}/>
          <span style={{fontSize:9,fontFamily:M,color:C.t3,padding:"1px 5px",border:`1px solid ${C.b1}`,borderRadius:3}}>ESC</span>
        </div>
        <div style={{maxHeight:300,overflowY:"auto"}}>
          {[
            {label:"Build All",cat:"Build",desc:`Full ${B.short} flow`,action:runBuild},
            {label:"Switch: Diamond",cat:"Backend",desc:"Lattice Diamond 3.13",action:()=>switchBackend("diamond")},
            {label:"Switch: Quartus",cat:"Backend",desc:"Intel Quartus Prime 23.1",action:()=>switchBackend("quartus")},
            {label:"Switch: Vivado",cat:"Backend",desc:"AMD Vivado 2024.1",action:()=>switchBackend("vivado")},
            {label:"Switch: OSS CAD",cat:"Backend",desc:"Yosys + nextpnr",action:()=>switchBackend("opensource")},

                const f=INTERCONNECT_BLOCKS.find(b=>b.id===w.from);
                const t=INTERCONNECT_BLOCKS.find(b=>b.id===w.to);
                if(!f||!t)return null;
                const fx=f.x+f.w/2,fy=f.y+f.h;
                const tx=t.x+t.w/2,ty=t.y;
                const mid=(fy+ty)/2;
                return <path key={i} d={`M${fx},${fy} C${fx},${mid} ${tx},${mid} ${tx},${ty}`}
                  stroke={ixHover===w.from||ixHover===w.to?C.accent:`${C.b2}`}
                  strokeWidth={ixHover===w.from||ixHover===w.to?2.5:1.5}
                  fill="none" strokeDasharray={w.from==="apb_br"?"4,3":"none"}
                  style={{transition:"all .2s"}}/>;
              })}
              {/* Draw blocks */}
              {INTERCONNECT_BLOCKS.map(b=>{
                const hov=ixHover===b.id;
                return <g key={b.id} onMouseEnter={()=>setIxHover(b.id)} onMouseLeave={()=>setIxHover(null)} style={{cursor:"pointer"}}>
                  <rect x={b.x} y={b.y} width={b.w} height={b.h} rx="6"

              <div style={{display:"flex",height:32,borderRadius:4,overflow:"hidden",border:`1px solid ${C.b1}`}}>
                {(()=>{
                  const cells=Array(32).fill(null);
                  REG_MAP[selReg].fields.forEach((f,fi)=>{
                    const colors=[C.accent,C.ok,C.warn,C.pink,C.cyan,C.purple,C.orange];
                    const col=colors[fi%colors.length];
                    if(f.bits.includes(":")){
                      const[hi,lo]=f.bits.split(":").map(Number);
                      for(let b=lo;b<=hi;b++)cells[31-b]={name:f.name,col};
                    }else{
                      const b=Number(f.bits);cells[31-b]={name:f.name,col};
                    }
                  });
                  return cells.map((c,i)=><div key={i} style={{flex:1,background:c?`${c.col}30`:C.bg,borderRight:`1px solid ${C.b1}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontFamily:M,color:c?c.col:C.t3,fontWeight:600,minWidth:0}}>
                    {c?"":" "}
                  </div>);
                })()}
              </div>
            </div>
            {/* Field table */}
            <div style={{fontSize:9,fontFamily:M,fontWeight:700,letterSpacing:1,color:C.t3,textTransform:"uppercase",display:"grid",gridTemplateColumns:"60px 80px 1fr 100px",gap:8,padding:"6px 10px",background:C.bg,borderRadius:"4px 4px 0 0",border:`1px solid ${C.b1}`,borderBottom:"none"}}>
              <span>Bits</span><span>Name</span><span>Description</span><span>Default</span>
            </div>
            {REG_MAP[selReg].fields.map((f,fi)=>{
              const colors=[C.accent,C.ok,C.warn,C.pink,C.cyan,C.purple,C.orange];
              return <div key={fi} style={{display:"grid",gridTemplateColumns:"60px 80px 1fr 100px",gap:8,padding:"8px 10px",fontSize:11,fontFamily:M,borderBottom:`1px solid ${C.b1}`,border:`1px solid ${C.b1}`,borderTop:"none"}}>
                <span style={{color:colors[fi%colors.length],fontWeight:600}}>[{f.bits}]</span>
                <span style={{color:C.t1,fontWeight:600}}>{f.name}</span>
                <span style={{color:C.t3}}>{f.desc||"—"}</span>
                <input style={{background:C.s2,border:`1px solid ${C.b1}`,borderRadius:3,padding:"2px 6px",color:C.accent,fontSize:10,fontFamily:M,outline:"none"}} defaultValue="0x0"/>
              </div>;
            })}
            <div style={{marginTop:16,display:"flex",gap:8}}>
              <Btn>Generate C Header</Btn>
              <Btn>Generate SV Package</Btn>
              <Btn>Generate Documentation</Btn>
            </div>
          </div>
        </div>}

        {/* ════ CONSTRAINTS ════ */}
        {section==="constraints"&&<div style={panel}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:`1px solid ${C.b1}`}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flex:1,padding:"4px 8px",background:C.bg,borderRadius:4,border:`1px solid ${C.b1}`}}>
              <I.Search/><input value={cSearch} onChange={e=>setCSearch(e.target.value)} placeholder="Filter pins or nets..."
                style={{flex:1,background:"transparent",border:"none",color:C.t1,fontSize:11,fontFamily:M,outline:"none"}}/>
            </div>
            <Btn small>Add Pin</Btn><Btn small>Import {B.constrExt}</Btn><Btn small>Sync</Btn>
            <Badge color={B.color}>{B.constrFmt}</Badge>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"80px 1fr 55px 85px 40px 30px",gap:6,padding:"6px 12px",fontSize:9,fontFamily:M,fontWeight:700,letterSpacing:1,color:C.t3,textTransform:"uppercase",borderBottom:`1px solid ${C.b1}`,background:C.bg}}>
            <span>Pin</span><span>Net</span><span>Dir</span><span>I/O Std</span><span>Bank</span><span>🔒</span>
          </div>
          <div style={{maxHeight:"calc(100vh - 220px)",overflowY:"auto"}}>
            {B.constraints.filter(c=>c.pin.toLowerCase().includes(cSearch.toLowerCase())||c.net.toLowerCase().includes(cSearch.toLowerCase())).map((c,i)=><ConstrRow key={i} c={c}/>)}
          </div>
        </div>}

        {/* ════ RESOURCES ════ */}
        {section==="resources"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div style={panelP}>
            {hdr(<>Utilization — <span style={{color:B.color}}>{B.defaultDev}</span></>,<I.Gauge/>)}
            {B.resources.map((r,i)=><RBar key={i} {...r}/>)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={panelP}>
              {hdr("Timing",null)}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[{l:"Fmax",v:`${B.timing.fmax} MHz`,c:C.ok},{l:"Target",v:`${B.timing.target} MHz`,c:C.t2},{l:"Setup",v:`${B.timing.setup} ns`,c:C.ok},{l:"Hold",v:`${B.timing.hold} ns`,c:parseFloat(B.timing.hold)<0.1?C.warn:C.ok}]
                  .map((t,i)=><div key={i} style={{padding:10,background:C.bg,borderRadius:5,border:`1px solid ${C.b1}`}}>
                    <div style={{fontSize:8,fontFamily:M,fontWeight:700,color:C.t3,marginBottom:3,textTransform:"uppercase",letterSpacing:.8}}>{t.l}</div>
                    <div style={{fontSize:16,fontFamily:M,fontWeight:700,color:t.c}}>{t.v}</div>
                  </div>)}
              </div>
            </div>
            <div style={panelP}>
              {hdr("Power Estimation",<I.Bolt/>)}
              {[{l:"Static (Quiescent)",v:"42 mW",pct:15},{l:"Dynamic (Clocks)",v:"118 mW",pct:42},{l:"Dynamic (Logic)",v:"67 mW",pct:24},{l:"Dynamic (I/O)",v:"31 mW",pct:11},{l:"Dynamic (BRAM)",v:"22 mW",pct:8}].map((p,i)=><div key={i} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:M,marginBottom:2}}>
                  <span style={{color:C.t2}}>{p.l}</span><span style={{color:C.warn}}>{p.v} ({p.pct}%)</span>
                </div>
                <div style={{height:4,borderRadius:2,background:C.b1,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${p.pct}%`,background:`linear-gradient(90deg,${C.warn}88,${C.warn})`,borderRadius:2}}/>
                </div>
              </div>)}
              <div style={{marginTop:8,padding:"8px 10px",background:C.bg,borderRadius:5,border:`1px solid ${C.b1}`,display:"flex",justifyContent:"space-between",fontSize:11,fontFamily:M}}>
                <span style={{color:C.t1,fontWeight:700}}>Total Estimated Power</span>
                <span style={{color:C.warn,fontWeight:700}}>280 mW</span>
              </div>
            </div>
          </div>
        </div>}

        {/* ════ CONSOLE ════ */}
        {section==="console"&&<div style={{...panel,height:"calc(100vh - 100px)",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderBottom:`1px solid ${C.b1}`,fontSize:10,fontFamily:M,color:C.t3}}>
            <span style={{color:B.color}}>{B.icon}</span>
            <span>{B.short} Output</span><span style={{flex:1}}/><span>CLI: {B.cli}</span><span>│</span><span>{logs.length} lines</span>
            <Btn small onClick={()=>setLogs([])}>Clear</Btn>
          </div>
          <div ref={logRef} style={{flex:1,overflowY:"auto",padding:"8px 14px",background:"#040609"}}>
            {logs.length===0&&<div style={{color:C.t3,fontSize:11,fontFamily:M,padding:16,textAlign:"center"}}>Hit <span style={{color:C.accent}}>Build</span> or <span style={{color:C.accent}}>⌘K</span></div>}
            {logs.map((l,i)=><CLine key={i} l={l}/>)}
            {building&&<div style={{fontSize:11,color:C.accent,fontFamily:M}}><span style={{animation:"pulse 1s infinite"}}>●</span> Building...</div>}
          </div>
        </div>}

      </div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
