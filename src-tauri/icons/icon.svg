<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a7cf5"/>
      <stop offset="100%" stop-color="#6b9dff"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d6ce8"/>
      <stop offset="100%" stop-color="#5b8cf0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Subtle grid pattern inside chip area (FPGA fabric) -->
  <g opacity="0.08" stroke="#5b8cf0" stroke-width="1">
    <line x1="176" y1="176" x2="176" y2="336"/>
    <line x1="216" y1="176" x2="216" y2="336"/>
    <line x1="256" y1="176" x2="256" y2="336"/>
    <line x1="296" y1="176" x2="296" y2="336"/>
    <line x1="336" y1="176" x2="336" y2="336"/>
    <line x1="176" y1="176" x2="336" y2="176"/>
    <line x1="176" y1="216" x2="336" y2="216"/>
    <line x1="176" y1="256" x2="336" y2="256"/>
    <line x1="176" y1="296" x2="336" y2="296"/>
    <line x1="176" y1="336" x2="336" y2="336"/>
  </g>

  <!-- Chip body (center square) -->
  <rect x="156" y="156" width="200" height="200" rx="12" ry="12"
        fill="none" stroke="url(#chip)" stroke-width="8"/>

  <!-- Pin traces - Top side -->
  <g stroke="#5b8cf0" stroke-width="6" stroke-linecap="round">
    <line x1="206" y1="156" x2="206" y2="88"/>
    <line x1="256" y1="156" x2="256" y2="88"/>
    <line x1="306" y1="156" x2="306" y2="88"/>
  </g>
  <!-- Pin pads - Top -->
  <circle cx="206" cy="82" r="10" fill="#5b8cf0"/>
  <circle cx="256" cy="82" r="10" fill="#5b8cf0"/>
  <circle cx="306" cy="82" r="10" fill="#5b8cf0"/>

  <!-- Pin traces - Bottom side -->
  <g stroke="#5b8cf0" stroke-width="6" stroke-linecap="round">
    <line x1="206" y1="356" x2="206" y2="424"/>
    <line x1="256" y1="356" x2="256" y2="424"/>
    <line x1="306" y1="356" x2="306" y2="424"/>
  </g>
  <!-- Pin pads - Bottom -->
  <circle cx="206" cy="430" r="10" fill="#5b8cf0"/>
  <circle cx="256" cy="430" r="10" fill="#5b8cf0"/>
  <circle cx="306" cy="430" r="10" fill="#5b8cf0"/>

  <!-- Pin traces - Left side -->
  <g stroke="#5b8cf0" stroke-width="6" stroke-linecap="round">
    <line x1="156" y1="206" x2="88" y2="206"/>
    <line x1="156" y1="256" x2="88" y2="256"/>
    <line x1="156" y1="306" x2="88" y2="306"/>
  </g>
  <!-- Pin pads - Left -->
  <circle cx="82" cy="206" r="10" fill="#5b8cf0"/>
  <circle cx="82" cy="256" r="10" fill="#5b8cf0"/>
  <circle cx="82" cy="306" r="10" fill="#5b8cf0"/>

  <!-- Pin traces - Right side -->
  <g stroke="#5b8cf0" stroke-width="6" stroke-linecap="round">
    <line x1="356" y1="206" x2="424" y2="206"/>
    <line x1="356" y1="256" x2="424" y2="256"/>
    <line x1="356" y1="306" x2="424" y2="306"/>
  </g>
  <!-- Pin pads - Right -->
  <circle cx="430" cy="206" r="10" fill="#5b8cf0"/>
  <circle cx="430" cy="256" r="10" fill="#5b8cf0"/>
  <circle cx="430" cy="306" r="10" fill="#5b8cf0"/>

  <!-- "C" letterform inside chip body -->
  <path d="M 290 210
           C 290 210, 270 200, 246 200
           C 218 200, 200 218, 200 246
           C 200 274, 218 312, 246 312
           C 270 312, 290 302, 290 302"
        fill="none" stroke="#8bb4ff" stroke-width="14" stroke-linecap="round"/>

  <!-- Orientation marker (pin 1 dot) -->
  <circle cx="178" cy="178" r="8" fill="#f59e0b" opacity="0.9"/>

  <!-- Subtle glow on chip body -->
  <rect x="156" y="156" width="200" height="200" rx="12" ry="12"
        fill="none" stroke="#5b8cf0" stroke-width="2" opacity="0.3"/>
</svg>
